name: "OSRS Market ETL Pipeline"

on:
  schedule:
    # Runs exactly every 5 minutes 24/7 (Warning: Use only on Public repos to avoid running out of Action Minutes)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Allows starting this workflow manually from the GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute OSRS Extraction to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # We provide a default User agent just for the GitHub runner to avoid 403 blocks from Wiki.
          OSRS_USER_AGENT: "Github Actions CI Pipeline for Data Engineering Demo"
        run: |
          echo "Starting the execution cycle"
          python full_run.py
